<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e1318"/>
      <stop offset="100%" stop-color="#080c10"/>
    </linearGradient>
    <!-- Subtle emerald glow behind text -->
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="12" fill="url(#bg)"/>

  <!-- Emerald border accent -->
  <rect width="64" height="64" rx="12" fill="none" stroke="#10b981" stroke-width="1.5" stroke-opacity="0.45"/>

  <!-- Subtle corner dot accents -->
  <circle cx="10" cy="10" r="1.5" fill="#10b981" fill-opacity="0.35"/>
  <circle cx="54" cy="54" r="1.5" fill="#10b981" fill-opacity="0.35"/>

  <!-- "HV" monogram — DM Mono style, emerald -->
  <text
    x="32"
    y="42"
    text-anchor="middle"
    font-family="'DM Mono', 'Courier New', monospace"
    font-size="24"
    font-weight="600"
    letter-spacing="1"
    fill="#10b981"
    filter="url(#glow)"
  >HV</text>

  <!-- Thin underline accent bar matching site logo style -->
  <rect x="18" y="47" width="28" height="1.5" rx="1" fill="#10b981" fill-opacity="0.55"/>
</svg>